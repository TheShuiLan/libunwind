# 在 "编译并安装动态库" 和 "编译并安装静态库" 步骤中，修改 API 变量
# 例如将 API=21 改为 API=23 或更高（如 28）
case ${ABI} in
  arm64-v8a)
    HOST="aarch64-linux-android"
    API=23    # 从 21 改为 23
    ;;
  armeabi-v7a)
    HOST="armv7a-linux-androideabi"
    API=23
    ;;
  x86_64)
    HOST="x86_64-linux-android"
    API=23
    ;;
  x86)
    HOST="i686-linux-android"
    API=23
    ;;
esac
