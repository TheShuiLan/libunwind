name: 手动触发 libunwind 编译并上传产物

# 仅保留架构选择，移除编译类型选择
on:
  workflow_dispatch:
    inputs:
      target_arch:
        description: '编译目标架构'
        required: true
        default: 'x86_64-linux-gnu'
        type: choice
        options:
          - x86_64-linux-gnu
          - aarch64-linux-gnu
          - arm-linux-gnueabihf
          - s390x-linux-gnu
          - loongarch64-linux-gnu

# 修正权限配置：移除无效的 artifacts 字段
permissions:
  contents: read
  actions: write  # 包含 Artifacts 上传/下载权限

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: 检出 libunwind 源码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 安装交叉编译工具链和依赖
        run: |
          sudo apt update && sudo apt install -y \
            cmake gcc make libc6-dev \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf \
            gcc-s390x-linux-gnu gcc-loongarch64-linux-gnu \
            crossbuild-essential-arm64 crossbuild-essential-armhf

      # 核心修改：分两次编译（静态+动态），输出到不同目录
      - name: 编译 libunwind 动态库（${{ github.event.inputs.target_arch }}）
        env:
          TARGET: ${{ github.event.inputs.target_arch }}
        run: |
          # 动态库编译目录
          mkdir -p build-shared && cd build-shared
          
          CMAKE_ARGS=(
            -DCMAKE_C_STANDARD=11
            -DTARGET=${TARGET}
            -DCMAKE_BUILD_TYPE=Release
            -DBUILD_SHARED_LIBS=ON   # 强制动态库
            -DBUILD_STATIC_LIBS=OFF
          )
          
          # 交叉编译编译器匹配
          case ${TARGET} in
            aarch64-linux-gnu)
              CMAKE_ARGS+=(-DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc)
              ;;
            arm-linux-gnueabihf)
              CMAKE_ARGS+=(-DCMAKE_C_COMPILER=arm-linux-gnueabihf-gcc)
              ;;
            s390x-linux-gnu)
              CMAKE_ARGS+=(-DCMAKE_C_COMPILER=s390x-linux-gnu-gcc)
              ;;
            loongarch64-linux-gnu)
              CMAKE_ARGS+=(-DCMAKE_C_COMPILER=loongarch64-linux-gnu-gcc)
              ;;
          esac
          
          cmake .. "${CMAKE_ARGS[@]}"
          make -j$(nproc)

      - name: 编译 libunwind 静态库（${{ github.event.inputs.target_arch }}）
        env:
          TARGET: ${{ github.event.inputs.target_arch }}
        run: |
          # 静态库编译目录
          mkdir -p build-static && cd build-static
          
          CMAKE_ARGS=(
            -DCMAKE_C_STANDARD=11
            -DTARGET=${TARGET}
            -DCMAKE_BUILD_TYPE=Release
            -DBUILD_SHARED_LIBS=OFF  # 强制静态库
            -DBUILD_STATIC_LIBS=ON
          )
          
          # 交叉编译编译器匹配
          case ${TARGET} in
            aarch64-linux-gnu)
              CMAKE_ARGS+=(-DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc)
              ;;
            arm-linux-gnueabihf)
              CMAKE_ARGS+=(-DCMAKE_C_COMPILER=arm-linux-gnueabihf-gcc)
              ;;
            s390x-linux-gnu)
              CMAKE_ARGS+=(-DCMAKE_C_COMPILER=s390x-linux-gnu-gcc)
              ;;
            loongarch64-linux-gnu)
              CMAKE_ARGS+=(-DCMAKE_C_COMPILER=loongarch64-linux-gnu-gcc)
              ;;
          esac
          
          cmake .. "${CMAKE_ARGS[@]}"
          make -j$(nproc)

      # 上传动态库产物
      - name: 上传动态库产物到 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libunwind-${{ github.event.inputs.target_arch }}-shared
          path: |
            build-shared/src/*.so*
            build-shared/src/*.so.*
          retention-days: 90

      # 上传静态库产物
      - name: 上传静态库产物到 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libunwind-${{ github.event.inputs.target_arch }}-static
          path: |
            build-static/src/*.a
          retention-days: 90

      # 可选：合并上传到同一个 Artifact（方便下载）
      - name: 合并上传静态+动态库产物
        uses: actions/upload-artifact@v4
        with:
          name: libunwind-${{ github.event.inputs.target_arch }}-all
          path: |
            build-shared/src/*.so*
            build-shared/src/*.so.*
            build-static/src/*.a
          retention-days: 90

      # 可选：上传到 GitHub Release
      - name: 创建 Release 并上传所有产物
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_id }}-${{ github.event.inputs.target_arch }}
          name: 手动编译产物-${{ github.event.inputs.target_arch }}（静态+动态）
          files: |
            build-shared/src/*.so*
            build-static/src/*.a
          draft: true
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
