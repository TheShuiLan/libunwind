name: 手动触发 libunwind 编译并上传产物

on:
  workflow_dispatch:
    inputs:
      target_arch:
        description: '编译目标架构'
        required: true
        default: 'x86_64-linux-gnu'
        type: choice
        options:
          - x86_64-linux-gnu
          - aarch64-linux-gnu
          - arm-linux-gnueabihf
          - s390x-linux-gnu
          - loongarch64-linux-gnu

permissions:
  contents: write
  actions: write
  packages: read

jobs:
  build-and-upload:
    runs-on: ubuntu-24.04
    steps:
      - name: 检出 libunwind 源码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 安装基础依赖和主流架构交叉编译工具链
        run: |
          sudo apt update && sudo apt install -y \
            cmake gcc make libc6-dev g++ bison flex texinfo \
            libgmp3-dev libmpfr-dev libmpc-dev autoconf automake libtool patch wget \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf gcc-s390x-linux-gnu \
            crossbuild-essential-arm64 crossbuild-essential-armhf

      - name: 手动编译 loongarch64 交叉编译器（仅 loongarch64 架构）
        if: github.event.inputs.target_arch == 'loongarch64-linux-gnu'
        run: |
          mkdir -p ~/gcc-build && cd ~/gcc-build
          wget https://ftp.gnu.org/gnu/gcc/gcc-12.2.0/gcc-12.2.0.tar.xz -q
          tar -xf gcc-12.2.0.tar.xz && cd gcc-12.2.0
          ./contrib/download_prerequisites -q
          mkdir -p build && cd build
          ../configure \
            --prefix=/usr/local \
            --target=loongarch64-linux-gnu \
            --enable-languages=c \
            --disable-multilib \
            --disable-nls \
            --disable-bootstrap
          make -j$(nproc)
          sudo make install
          loongarch64-linux-gnu-gcc --version
          echo "PATH=/usr/local/bin:$PATH" >> $GITHUB_ENV

      # 动态库编译（使用 autotools，仅生成共享库）
      - name: 编译 libunwind 动态库（${{ github.event.inputs.target_arch }}）
        env:
          TARGET: ${{ github.event.inputs.target_arch }}
        run: |
          # 清理并创建构建目录
          rm -rf build-shared
          mkdir -p build-shared && cd build-shared
          
          # 根据目标架构设置 --host 参数
          case ${TARGET} in
            x86_64-linux-gnu)      HOST_ARG="" ;;
            aarch64-linux-gnu)     HOST_ARG="--host=aarch64-linux-gnu" ;;
            arm-linux-gnueabihf)   HOST_ARG="--host=arm-linux-gnueabihf" ;;
            s390x-linux-gnu)       HOST_ARG="--host=s390x-linux-gnu" ;;
            loongarch64-linux-gnu) HOST_ARG="--host=loongarch64-linux-gnu" ;;
          esac
          
          # 运行 configure，强制生成共享库，禁用静态库
          ../configure $HOST_ARG \
            --enable-shared \
            --disable-static \
            --prefix=$(pwd)/install
          
          # 编译
          make -j$(nproc)
          
          # 列出产物（通常位于 .libs 目录）
          echo "动态库产物列表："
          find . -name "*.so*" -type f

      # 静态库编译（使用 autotools，仅生成静态库）
      - name: 编译 libunwind 静态库（${{ github.event.inputs.target_arch }}）
        env:
          TARGET: ${{ github.event.inputs.target_arch }}
        run: |
          # 清理并创建构建目录
          rm -rf build-static
          mkdir -p build-static && cd build-static
          
          # 根据目标架构设置 --host 参数
          case ${TARGET} in
            x86_64-linux-gnu)      HOST_ARG="" ;;
            aarch64-linux-gnu)     HOST_ARG="--host=aarch64-linux-gnu" ;;
            arm-linux-gnueabihf)   HOST_ARG="--host=arm-linux-gnueabihf" ;;
            s390x-linux-gnu)       HOST_ARG="--host=s390x-linux-gnu" ;;
            loongarch64-linux-gnu) HOST_ARG="--host=loongarch64-linux-gnu" ;;
          esac
          
          # 运行 configure，强制生成静态库，禁用共享库
          ../configure $HOST_ARG \
            --enable-static \
            --disable-shared \
            --prefix=$(pwd)/install
          
          # 编译
          make -j$(nproc)
          
          # 列出产物（通常位于 .libs 目录）
          echo "静态库产物列表："
          find . -name "*.a" -type f

      # 上传动态库产物（修复路径：递归匹配 .libs 目录）
      - name: 上传动态库产物到 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libunwind-${{ github.event.inputs.target_arch }}-shared
          path: |
            build-shared/**/.libs/*.so
            build-shared/**/.libs/*.so.*
          if-no-files-found: warn
          retention-days: 90

      # 上传静态库产物（修复路径：递归匹配 .libs 目录）
      - name: 上传静态库产物到 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libunwind-${{ github.event.inputs.target_arch }}-static
          path: build-static/**/.libs/*.a
          if-no-files-found: warn
          retention-days: 90

      # 合并上传（同时包含 .so 和 .a）
      - name: 合并上传静态+动态库产物
        uses: actions/upload-artifact@v4
        with:
          name: libunwind-${{ github.event.inputs.target_arch }}-all
          path: |
            build-shared/**/.libs/*.so*
            build-static/**/.libs/*.a
          if-no-files-found: warn
          retention-days: 90

      # 创建 Release 并上传所有产物（使用递归匹配）
      - name: 创建 Release 并上传所有产物
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_id }}-${{ github.event.inputs.target_arch }}
          name: 手动编译产物-${{ github.event.inputs.target_arch }}（静态+动态）
          files: |
            build-shared/**/.libs/*.so*
            build-static/**/.libs/*.a
          draft: true
          prerelease: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
