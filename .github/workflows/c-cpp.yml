name: 手动编译完整 libunwindstack（Android）

on:
  workflow_dispatch:
    inputs:
      target_arch:
        description: '编译目标架构 (Android ABI)'
        required: true
        default: 'arm64-v8a'
        type: choice
        options:
          - arm64-v8a
          - armeabi-v7a
          - x86_64
          - x86

permissions:
  contents: write
  actions: write
  packages: read

jobs:
  build-android:
    runs-on: ubuntu-24.04
    steps:
      - name: 安装基础依赖
        run: |
          sudo apt update && sudo apt install -y \
            cmake ninja-build git python3

      - name: 下载并配置 Android NDK
        run: |
          # 使用官方 NDK r26c 链接（若仍失效，可尝试替换为国内镜像源）
          wget -q https://dl.google.com/android/repository/android-ndk-r26c-linux.zip
          unzip -q android-ndk-r26c-linux.zip
          echo "NDK_HOME=$PWD/android-ndk-r26c" >> $GITHUB_ENV
          echo "$PWD/android-ndk-r26c/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      - name: 下载并解压 libunwindstack 源码
        run: |
          # 直接下载指定的 tar.gz 归档文件
          wget -q https://android.googlesource.com/platform/system/unwinding/+archive/refs/heads/main/libunwindstack.tar.gz
          # 创建目标目录并解压（注意：tar.gz 内部通常直接是源码文件，不带上层目录）
          mkdir -p libunwindstack
          tar -xzf libunwindstack.tar.gz -C libunwindstack

      - name: 创建 CMakeLists.txt（启用 Dex/JIT）
        working-directory: libunwindstack
        run: |
          cat > CMakeLists.txt << 'EOF'
          cmake_minimum_required(VERSION 3.10)
          project(libunwindstack VERSION 1.0.0 LANGUAGES C CXX)

          set(CMAKE_CXX_STANDARD 17)
          set(CMAKE_CXX_STANDARD_REQUIRED ON)
          set(CMAKE_POSITION_INDEPENDENT_CODE ON)

          # 头文件路径
          include_directories(
            ${CMAKE_CURRENT_SOURCE_DIR}/include
            ${CMAKE_CURRENT_SOURCE_DIR}
            ${CMAKE_CURRENT_SOURCE_DIR}/utils
          )

          # 所有源文件（启用所有可选模块）
          set(SOURCES
            AndroidLogStdout.cpp
            AndroidUnwinder.cpp
            ArmExidx.cpp
            Demangle.cpp
            DexFile.cpp
            DexFiles.cpp
            DwarfCfa.cpp
            DwarfEhFrameWithHdr.cpp
            DwarfMemory.cpp
            DwarfOp.cpp
            DwarfSection.cpp
            Elf.cpp
            ElfInterface.cpp
            ElfInterfaceArm.cpp
            Global.cpp
            JitDebug.cpp
            LogAndroid.cpp
            LogStdout.cpp
            MapInfo.cpp
            Maps.cpp
            Memory.cpp
            MemoryXz.cpp
            Regs.cpp
            RegsArm.cpp
            RegsArm64.cpp
            RegsRiscv64.cpp
            RegsX86.cpp
            RegsX86_64.cpp
            Symbols.cpp
            ThreadEntry.cpp
            ThreadUnwinder.cpp
            Unwinder.cpp
          )

          # 根据架构选择对应的汇编文件
          if(ANDROID_ABI STREQUAL "arm64-v8a")
            list(APPEND SOURCES AsmGetRegsArm64.S)
          elseif(ANDROID_ABI STREQUAL "armeabi-v7a")
            list(APPEND SOURCES AsmGetRegsArm.S)
          elseif(ANDROID_ABI STREQUAL "x86_64")
            list(APPEND SOURCES AsmGetRegsX86_64.S)
          elseif(ANDROID_ABI STREQUAL "x86")
            list(APPEND SOURCES AsmGetRegsX86.S)
          endif()

          # 可选模块（默认全部启用）
          option(ENABLE_XZ "Enable Xz support (requires liblzma)" ON)

          if(NOT ENABLE_XZ)
            list(REMOVE_ITEM SOURCES MemoryXz.cpp)
          endif()

          # 构建静态库
          add_library(unwindstack STATIC ${SOURCES})

          # 链接库
          target_link_libraries(unwindstack log)
          if(ENABLE_XZ)
            # NDK 中可能没有 lzma，如果找不到，会链接失败
            find_library(LZMA_LIB lzma)
            if(LZMA_LIB)
              target_link_libraries(unwindstack ${LZMA_LIB})
              target_compile_definitions(unwindstack PRIVATE HAVE_LZMA)
            else()
              message(WARNING "liblzma not found; XZ support will be disabled")
              target_compile_definitions(unwindstack PRIVATE DISABLE_XZ)
            endif()
          endif()

          # 导出头文件
          target_include_directories(unwindstack PUBLIC
            $<BUILD_INTERFACE:${CMAKE_CURRENT_SOURCE_DIR}/include>
            $<INSTALL_INTERFACE:include>
          )

          install(TARGETS unwindstack ARCHIVE DESTINATION lib)
          install(DIRECTORY include/ DESTINATION include)
          EOF

      - name: 编译 libunwindstack（完整版）
        env:
          ABI: ${{ github.event.inputs.target_arch }}
        working-directory: libunwindstack
        run: |
          rm -rf build install
          mkdir build && cd build

          case ${ABI} in
            arm64-v8a)
              TOOLCHAIN_ARGS="-DANDROID_ABI=arm64-v8a -DCMAKE_SYSTEM_NAME=Android -DCMAKE_ANDROID_ARCH_ABI=arm64-v8a"
              ;;
            armeabi-v7a)
              TOOLCHAIN_ARGS="-DANDROID_ABI=armeabi-v7a -DCMAKE_SYSTEM_NAME=Android -DCMAKE_ANDROID_ARCH_ABI=armeabi-v7a"
              ;;
            x86_64)
              TOOLCHAIN_ARGS="-DANDROID_ABI=x86_64 -DCMAKE_SYSTEM_NAME=Android -DCMAKE_ANDROID_ARCH_ABI=x86_64"
              ;;
            x86)
              TOOLCHAIN_ARGS="-DANDROID_ABI=x86 -DCMAKE_SYSTEM_NAME=Android -DCMAKE_ANDROID_ARCH_ABI=x86"
              ;;
          esac

          cmake .. -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=${NDK_HOME}/build/cmake/android.toolchain.cmake \
            -DANDROID_PLATFORM=android-23 \
            ${TOOLCHAIN_ARGS} \
            -DENABLE_XZ=ON

          ninja
          mkdir -p ../install/lib
          cp libunwindstack.a ../install/lib/
          cp -r ../include ../install/

          echo "========== 安装目录内容 =========="
          find ../install -type f

      - name: 上传静态库产物到 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libunwindstack-${{ github.event.inputs.target_arch }}-static
          path: libunwindstack/install/lib/libunwindstack.a
          if-no-files-found: error
          retention-days: 90

      - name: 创建 Release 并上传产物
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_id }}-${{ github.event.inputs.target_arch }}
          name: 完整编译产物-Android ${{ github.event.inputs.target_arch }}（libunwindstack）
          files: libunwindstack/install/lib/libunwindstack.a
          draft: true
          prerelease: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
