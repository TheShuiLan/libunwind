name: Build libunwind
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target: [
          x86_64-linux-gnu,
          aarch64-linux-gnu,
          arm-linux-gnueabihf,
          s390x-linux-gnu,
          loongarch64-linux-gnu
        ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: libunwind

      - name: Install dependencies
        run: |
          sudo apt update
          # 安装编译依赖（修复 texinfo 传递错误，提前安装）
          sudo apt install -y cmake gcc g++ texinfo libtool autoconf automake pkg-config
          # 安装交叉编译工具链（按需）
          case ${{ matrix.target }} in
            aarch64-linux-gnu) sudo apt install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu ;;
            arm-linux-gnueabihf) sudo apt install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf ;;
            s390x-linux-gnu) sudo apt install -y gcc-s390x-linux-gnu g++-s390x-linux-gnu ;;
            loongarch64-linux-gnu) sudo apt install -y gcc-loongarch64-linux-gnu g++-loongarch64-linux-gnu ;;
          esac

      - name: Configure CMake
        run: |
          cd libunwind
          # 设置目标架构环境变量（修复 CMake 依赖的 TARGET 变量）
          export TARGET=${{ matrix.target }}
          # 创建构建目录（避免源码目录污染，修复路径错误）
          mkdir -p build && cd build
          # 执行 CMake（修复源码目录错误，移除多余参数）
          cmake .. \
            -DCMAKE_C_STANDARD=11 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=${{ matrix.target }}-gcc \
            -DCMAKE_CXX_COMPILER=${{ matrix.target }}-g++

      - name: Build libunwind
        run: |
          cd libunwind/build
          # 多核编译
          make -j$(nproc)

      - name: Verify build
        run: |
          cd libunwind/build
          # 检查编译产物
          ls -l src/*.so || ls -l src/*.a
          # 可选：运行测试（需提前安装测试依赖）
          # make check

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libunwind-${{ matrix.target }}
          path: libunwind/build/src/
